<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentContable — Procesamiento Inteligente</title>
    <meta name="description" content="Agente contable inteligente para la gestión y clasificación automática de documentos financieros.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════
           DESIGN TOKENS
           ═══════════════════════════════════════════════ */
        :root {
            --bg-base: #0b0f1a;
            --bg-card: rgba(17, 24, 45, 0.7);
            --bg-card-border: rgba(99, 102, 241, 0.15);
            --surface-glass: rgba(255, 255, 255, 0.03);

            --accent-start: #6366f1;
            --accent-end: #a855f7;
            --accent-glow: rgba(99, 102, 241, 0.35);

            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;

            --success: #34d399;
            --success-bg: rgba(52, 211, 153, 0.08);
            --error: #f87171;
            --error-bg: rgba(248, 113, 113, 0.08);

            --radius-lg: 1.25rem;
            --radius-md: 0.75rem;
            --radius-sm: 0.5rem;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ═══════════════════════════════════════════════
           RESET & BASE
           ═══════════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
            overflow: hidden;
        }

        /* Animated gradient background orbs */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: 0;
            animation: floatOrb 12s ease-in-out infinite alternate;
        }
        body::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--accent-start), transparent 70%);
            top: -150px; left: -100px;
        }
        body::after {
            width: 400px; height: 400px;
            background: radial-gradient(circle, var(--accent-end), transparent 70%);
            bottom: -120px; right: -80px;
            animation-delay: -6s;
        }

        @keyframes floatOrb {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 30px) scale(1.15); }
        }

        /* ═══════════════════════════════════════════════
           CARD
           ═══════════════════════════════════════════════ */
        .card {
            position: relative;
            z-index: 1;
            background: var(--bg-card);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid var(--bg-card-border);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2rem 2rem;
            width: 100%;
            max-width: 26rem;
            text-align: center;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.04),
                0 20px 50px -12px rgba(0, 0, 0, 0.5);
            transition: box-shadow var(--transition);
        }
        .card:hover {
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.06),
                0 25px 60px -10px rgba(0, 0, 0, 0.55),
                0 0 40px -10px var(--accent-glow);
        }

        /* ═══════════════════════════════════════════════
           LOGO / ICON
           ═══════════════════════════════════════════════ */
        .logo-icon {
            width: 56px; height: 56px;
            margin: 0 auto 1.25rem;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px -4px var(--accent-glow);
        }
        .logo-icon svg {
            width: 28px; height: 28px;
            fill: none;
            stroke: white;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ═══════════════════════════════════════════════
           TYPOGRAPHY
           ═══════════════════════════════════════════════ */
        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.35rem;
        }
        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        /* ═══════════════════════════════════════════════
           BUTTON
           ═══════════════════════════════════════════════ */
        .btn-ejecutar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            width: 100%;
            padding: 0.85rem 1.5rem;
            border: none;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
            box-shadow: 0 4px 16px -2px var(--accent-glow);
        }
        .btn-ejecutar:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px -4px var(--accent-glow);
        }
        .btn-ejecutar:active:not(:disabled) {
            transform: translateY(0);
        }
        .btn-ejecutar:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        /* Shimmer effect on hover */
        .btn-ejecutar::after {
            content: '';
            position: absolute;
            top: 0; left: -75%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
            transition: none;
        }
        .btn-ejecutar:hover:not(:disabled)::after {
            animation: shimmer 0.8s ease-out;
        }
        @keyframes shimmer {
            to { left: 125%; }
        }

        .btn-ejecutar svg {
            width: 18px; height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        /* Spinner inside button */
        .spinner {
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ═══════════════════════════════════════════════
           PROGRESS BAR
           ═══════════════════════════════════════════════ */
        .progress-wrapper {
            margin-top: 1.5rem;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: opacity 0.4s ease, max-height 0.4s ease;
        }
        .progress-wrapper.visible {
            opacity: 1;
            max-height: 80px;
        }

        .progress-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        .progress-label .dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent-start);
            animation: pulse-dot 1.2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50%      { opacity: 1; transform: scale(1.2); }
        }

        .progress-track {
            width: 100%;
            height: 6px;
            border-radius: 999px;
            background: var(--surface-glass);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .progress-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
            width: 0%;
            transition: width 0.4s ease;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            animation: progress-shimmer 1.5s ease-in-out infinite;
        }
        @keyframes progress-shimmer {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ═══════════════════════════════════════════════
           STATUS MESSAGE
           ═══════════════════════════════════════════════ */
        .status-area {
            margin-top: 1.25rem;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.5s ease, transform 0.5s ease, max-height 0.5s ease;
            max-height: 0;
            overflow: hidden;
        }
        .status-area.visible {
            opacity: 1;
            transform: translateY(0);
            max-height: 200px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1.15rem;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-weight: 600;
            line-height: 1.4;
        }
        .status-badge.success {
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid rgba(52, 211, 153, 0.2);
        }
        .status-badge.error {
            background: var(--error-bg);
            color: var(--error);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }
        .status-badge svg {
            width: 16px; height: 16px;
            flex-shrink: 0;
        }

        /* ═══════════════════════════════════════════════
           LOG VIEWER
           ═══════════════════════════════════════════════ */
        .log-toggle {
            display: none;
            margin-top: 0.75rem;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: color var(--transition);
        }
        .log-toggle:hover { color: var(--text-secondary); }
        .log-toggle.visible { display: inline-block; }

        .log-panel {
            margin-top: 0.75rem;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            text-align: left;
        }
        .log-panel.open { max-height: 300px; }

        .log-content {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-sm);
            padding: 0.75rem;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.68rem;
            line-height: 1.65;
            color: var(--text-muted);
            max-height: 240px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .log-content::-webkit-scrollbar { width: 4px; }
        .log-content::-webkit-scrollbar-track { background: transparent; }
        .log-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 999px;
        }

        /* ═══════════════════════════════════════════════
           FOOTER
           ═══════════════════════════════════════════════ */
        .footer-text {
            margin-top: 1.5rem;
            font-size: 0.68rem;
            color: var(--text-muted);
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="card" id="main-card">
        <!-- Logo -->
        <div class="logo-icon">
            <svg viewBox="0 0 24 24">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
            </svg>
        </div>

        <h1>AgentContable</h1>
        <p class="subtitle">Procesamiento inteligente de documentos financieros</p>

        <!-- Button -->
        <button class="btn-ejecutar" id="btn-ejecutar" type="button">
            <svg viewBox="0 0 24 24">
                <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            Ejecutar Procesamiento
        </button>

        <!-- Progress Bar -->
        <div class="progress-wrapper" id="progress-wrapper">
            <p class="progress-label">
                <span class="dot"></span>
                Procesando documentos…
            </p>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <!-- Status Message -->
        <div class="status-area" id="status-area">
            <div class="status-badge" id="status-badge"></div>
            <button class="log-toggle" id="log-toggle">Ver registro detallado ▾</button>
            <div class="log-panel" id="log-panel">
                <pre class="log-content" id="log-content"></pre>
            </div>
        </div>

        <p class="footer-text">Powered by Estevn Sanchez</p>
    </div>

    <script>
        const btnEjecutar    = document.getElementById('btn-ejecutar');
        const progressWrap   = document.getElementById('progress-wrapper');
        const progressFill   = document.getElementById('progress-fill');
        const statusArea     = document.getElementById('status-area');
        const statusBadge    = document.getElementById('status-badge');
        const logToggle      = document.getElementById('log-toggle');
        const logPanel       = document.getElementById('log-panel');
        const logContent     = document.getElementById('log-content');

        let isProcessing = false;

        // ── Simulated progress ──────────────────────
        let progressValue = 0;
        let progressTimer = null;

        function startFakeProgress() {
            progressValue = 0;
            progressFill.style.width = '0%';
            progressWrap.classList.add('visible');

            progressTimer = setInterval(() => {
                // Slow down as it gets closer to 90%
                const remaining = 90 - progressValue;
                const increment = Math.max(0.3, remaining * 0.04);
                progressValue = Math.min(progressValue + increment, 90);
                progressFill.style.width = progressValue + '%';
            }, 300);
        }

        function finishProgress(success) {
            clearInterval(progressTimer);
            progressValue = 100;
            progressFill.style.width = '100%';

            // Hide progress bar after completing
            setTimeout(() => {
                progressWrap.classList.remove('visible');
            }, 600);
        }

        // ── Status display ──────────────────────────
        function showStatus(message, type, log) {
            const iconSuccess = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
            const iconError   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`;

            statusBadge.className = 'status-badge ' + type;
            statusBadge.innerHTML = (type === 'success' ? iconSuccess : iconError) + `<span>${message}</span>`;
            statusArea.classList.add('visible');

            // Log
            if (log && log.trim()) {
                logContent.textContent = log;
                logToggle.classList.add('visible');
            } else {
                logToggle.classList.remove('visible');
            }
        }

        function hideStatus() {
            statusArea.classList.remove('visible');
            logPanel.classList.remove('open');
            logToggle.classList.remove('visible');
        }

        // ── Log toggle ──────────────────────────────
        logToggle.addEventListener('click', () => {
            const isOpen = logPanel.classList.toggle('open');
            logToggle.textContent = isOpen ? 'Ocultar registro ▴' : 'Ver registro detallado ▾';
        });

        // ── Main action ─────────────────────────────
        btnEjecutar.addEventListener('click', async () => {
            if (isProcessing) return;
            isProcessing = true;

            // Reset UI
            hideStatus();
            btnEjecutar.disabled = true;
            btnEjecutar.innerHTML = `<span class="spinner"></span> Procesando…`;

            startFakeProgress();

            try {
                const response = await fetch('/api/ejecutar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();

                finishProgress(response.ok);

                // Small delay for progress bar to finish visually
                setTimeout(() => {
                    if (response.ok && data.status === 'ok') {
                        showStatus(data.mensaje, 'success', data.log);
                    } else {
                        showStatus(data.mensaje || 'Error desconocido del servidor.', 'error', data.log);
                    }
                }, 700);

            } catch (error) {
                finishProgress(false);
                setTimeout(() => {
                    showStatus('Error de conexión con el servidor.', 'error', error.message);
                }, 700);
            } finally {
                // Re-enable button
                setTimeout(() => {
                    btnEjecutar.disabled = false;
                    btnEjecutar.innerHTML = `
                        <svg viewBox="0 0 24 24">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                        Ejecutar Procesamiento
                    `;
                    isProcessing = false;
                }, 800);
            }
        });
    </script>
</body>
</html>
