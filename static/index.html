<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentContable Dashboard</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --text-secondary: #6b7280;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            width: 100%;
            max-width: 28rem;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            color: var(--text-color);
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            background-color: #fff;
            transition: border-color 0.2s;
            box-sizing: border-box;
            font-size: 0.875rem;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            background-color: var(--primary-color);
            font-size: 0.875rem;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .divider {
            border-top: 1px solid #e5e7eb;
            margin: 2rem 0;
            position: relative;
        }

        .divider span {
            background-color: var(--card-bg);
            padding: 0 1rem;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #status {
            margin-top: 1rem;
            font-size: 0.875rem;
            min-height: 1.25rem;
        }

        .success { color: #059669; font-weight: 500; }
        .error { color: #dc2626; font-weight: 500; }
    </style>
</head>
<body>
    <div class="card">
        <h1>AgentContable</h1>
        <p>Gestión inteligente de documentos financieros</p>

        <div class="divider">
            <span>Ejecutar Proceso Automático</span>
        </div>

        <div class="button-group" style="display: flex; flex-direction: column; gap: 1rem;">
            <button class="btn webhook-btn" data-action="Ejecutar" style="background-color: var(--primary-color);">
                Ejecutar Procesamiento
            </button>
            <button class="btn webhook-btn" data-action="Excepciones" style="background-color: #f59e0b;">
                Procesar Excepciones
            </button>
            <button class="btn webhook-btn" data-action="Pendientes" style="background-color: #10b981;">
                Procesar Pendientes
            </button>
        </div>
        
        <div id="status"></div>
    </div>

    <script>
        const buttons = document.querySelectorAll('.webhook-btn');
        const statusDiv = document.getElementById('status');
        
        // URL del Webhook "quemada"
        const WEBHOOK_URL = 'https://n8n.tailefb94c.ts.net/webhook/91cf4b42-9b37-47c6-9150-bfcb318b924a';
        const WEBHOOK_URL_TEST = 'https://n8n.tailefb94c.ts.net/webhook-test/91cf4b42-9b37-47c6-9150-bfcb318b924a';

        // Función para cambiar el estado de los botones
        function setButtonsState(isProcessing, processingAction = null) {
            buttons.forEach(b => {
                b.disabled = isProcessing;
                b.style.opacity = isProcessing ? '0.7' : '1';
                
                // Guardar el texto original la primera vez
                if (!b.dataset.originalText) {
                    b.dataset.originalText = b.innerText;
                }

                if (isProcessing) {
                    if (b.getAttribute('data-action') === processingAction) {
                        b.innerText = 'Procesando...';
                    }
                } else {
                    b.innerText = b.dataset.originalText;
                }
            });
        }

        // Revisar si ya hay un proceso en curso (por si el usuario recarga la página)
        const currentProcess = localStorage.getItem('n8n_processing_action');
        if (currentProcess) {
            setButtonsState(true, currentProcess);
            showStatus(`Hay una solicitud (${currentProcess}) en proceso. Por favor espera...`, '');
        }

        buttons.forEach(btn => {
            btn.addEventListener('click', async () => {
                // Prevenir clics dobles si ya está procesando
                if (btn.disabled) return;

                const action = btn.getAttribute('data-action');
                
                // Guardar el estado local indicando qué proceso se inició
                localStorage.setItem('n8n_processing_action', action);

                showStatus(`Enviando solicitud (${action})...`, '');
                setButtonsState(true, action);

                try {
                    // Enviamos el texto directamente
                    const response = await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'text/plain'
                        },
                        body: action
                    });

                    if (response.ok) {
                        showStatus(`¡Proceso ${action} iniciado exitosamente!`, 'success');
                    } else {
                        showStatus('Error del servidor: ' + response.status, 'error');
                    }
                } catch (error) {
                    console.error(error);
                    showStatus('Error de conexión (CORS o Red).', 'error');
                } finally {
                    // Limpiar estado en localStorage cuando termine la petición (sea con éxito o por error)
                    localStorage.removeItem('n8n_processing_action');
                    setButtonsState(false);
                    
                    // Limpiar mensaje de éxito después de unos segundos
                    setTimeout(() => { 
                        if(statusDiv.className === 'success') {
                            statusDiv.textContent = ''; 
                            statusDiv.className = '';
                        }
                    }, 5000);
                }
            });
        });

        function showStatus(msg, type) {
            statusDiv.textContent = msg;
            statusDiv.className = type;
        }
    </script>
</body>
</html>
